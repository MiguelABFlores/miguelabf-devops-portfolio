name: Build and Deploy

# Branch model (each branch pushes to its own Harbor repo):
#   production  → portfolio/production. Pushes :latest + :sha-<sha> and updates
#                 GitOps (apps/portfolio). ArgoCD auto-syncs (automated sync on
#                 the portfolio app) — CI does not run `argocd app sync`.
#   development → portfolio/development. Pushes :latest + :dev-<sha> and updates
#                 GitOps (apps/portfolio-dev). ArgoCD auto-syncs the preview.
#   PRs         → build-only smoke test (no push); cache pulled from the target
#                 branch's repo.
# No paths filter — intentional. Asset-only changes (CV PDF, profile photo)
# must also trigger a rebuild so the new files are baked into the image.
#
# Builds run on dind's built-in BuildKit (the "docker" buildx driver), amd64
# only — matching the cluster (no arm64 nodes). That driver trusts the homelab
# CA via /etc/docker/certs.d, unlike a docker-container BuildKit instance.
# Build cache: dind's persistent local layer cache reuses npm ci / npm run build
# across builds on this single-pod runner, so a PR build warms the cache for the
# follow-up merge build; :latest also carries inline cache to warm the final
# stage after a pod restart.
on:
  push:
    branches: [production, development]
  pull_request:
    branches: [production, development]
  workflow_dispatch:

# Cancel superseded runs to avoid wasting the runner on stale commits.
# production is exempt — never cancel a production build/deploy mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/production' }}

env:
  HARBOR_REGISTRY: harbor.192.168.0.240.nip.io
  # Each branch pushes to its own repo under this project:
  #   production  → portfolio/production
  #   development → portfolio/development
  HARBOR_PROJECT: portfolio
  GITOPS_REPO: MiguelABFlores/homelab-gitops

jobs:
  build-and-push:
    name: Build & Push to Harbor
    runs-on: [self-hosted, homelab]
    timeout-minutes: 30
    steps:
      - name: Checkout portfolio source
        uses: actions/checkout@v4

      - name: Compute build params
        id: vars
        shell: bash
        run: |
          SHORT_SHA=${GITHUB_SHA::8}

          # Resolve the target Harbor repo from the branch. PRs build against the
          # repo they target (base branch) so the cache warms the right one.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.base_ref }}"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
          fi
          if [ "$BRANCH" = "production" ]; then
            REPO="production"
          else
            REPO="development"
          fi
          REG="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${REPO}"
          CACHE_REF="${REG}:latest"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR build — local only, no push (still pulls the target repo's cache)
            PUSH=false
            IMAGE_TAG="pr-${{ github.event.pull_request.number }}"
            TAGS="local/portfolio:${IMAGE_TAG}"
          elif [ "${{ github.ref }}" = "refs/heads/production" ]; then
            # Production build — push :sha-<sha> + :latest to portfolio/production
            PUSH=true
            IMAGE_TAG="sha-${SHORT_SHA}"
            TAGS="${REG}:sha-${SHORT_SHA}
          ${REG}:latest"
          elif [ "${{ github.ref }}" = "refs/heads/development" ]; then
            # Dev build — push :dev-<sha> + :latest to portfolio/development
            PUSH=true
            IMAGE_TAG="dev-${SHORT_SHA}"
            TAGS="${REG}:dev-${SHORT_SHA}
          ${REG}:latest"
          else
            # workflow_dispatch on a non-default branch — build only
            PUSH=false
            IMAGE_TAG="branch-${SHORT_SHA}"
            TAGS="local/portfolio:${IMAGE_TAG}"
          fi

          echo "PUSH=${PUSH}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "CACHE_REF=${CACHE_REF}" >> "$GITHUB_OUTPUT"
          {
            echo 'TAGS<<EOF'
            echo "${TAGS}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "Build params: ref=${{ github.ref }} event=${{ github.event_name }} repo=${REPO} push=${PUSH} tag=${IMAGE_TAG}"

      # Log in on every event: PR builds (push=false) still need Harbor auth to
      # pull the inline cache from :latest; production/development builds also push.
      - name: Login to Harbor
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          echo "$HARBOR_PASSWORD" | \
          docker login "$HARBOR_REGISTRY" \
            --username "$HARBOR_USERNAME" \
            --password-stdin

      # Default "docker" driver = dind's built-in BuildKit, which trusts the
      # homelab CA via /etc/docker/certs.d. A docker-container BuildKit instance
      # has its own trust store with no way to inject the LAN CA (buildx doesn't
      # mount cert files), so it fails x509 against Harbor. This driver is
      # amd64-only, which is fine — the cluster has no arm64 nodes.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build (and conditionally push) image
        uses: docker/build-push-action@v5
        with:
          context: .
          # No platforms set: the docker driver builds natively for amd64.
          push: ${{ steps.vars.outputs.PUSH }}
          tags: ${{ steps.vars.outputs.TAGS }}
          # The docker driver can't export a registry (mode=max) cache, so the
          # builder-stage layers (npm ci / npm run build) are reused from dind's
          # persistent local cache across builds on this single-pod runner. The
          # inline cache below is embedded in each repo's :latest to warm the
          # final stage after a pod restart; cache-from targets the branch's own
          # repo (portfolio/production or portfolio/development) and is
          # best-effort (skipped if absent).
          cache-from: type=registry,ref=${{ steps.vars.outputs.CACHE_REF }}
          cache-to: type=inline

      - name: Output image tag
        run: |
          echo "Built ${{ steps.vars.outputs.IMAGE_TAG }} (push=${{ steps.vars.outputs.PUSH }})"

  update-gitops:
    name: Update GitOps Repo
    needs: build-and-push
    # PROD-ONLY: only push to production triggers GitOps update + ArgoCD sync.
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'
    runs-on: [self-hosted, homelab]
    timeout-minutes: 15
    steps:
      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Checkout homelab-gitops
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: homelab-gitops

      - name: Update image tag in deployment
        run: |
          cd homelab-gitops
          # Production deploys pull from portfolio/production. Match the old
          # (portfolio/site) or current (portfolio/production) repo so this works
          # across the cutover and steady state.
          sed -i -E "s|image: harbor.192.168.0.240.nip.io/portfolio/[^:[:space:]]+:.*|image: harbor.192.168.0.240.nip.io/portfolio/production:${{ steps.vars.outputs.IMAGE_TAG }}|" \
            apps/portfolio/deployment.yaml
          echo "Updated to: ${{ steps.vars.outputs.IMAGE_TAG }}"
          grep "image:" apps/portfolio/deployment.yaml

      - name: Commit and push to homelab-gitops
        run: |
          cd homelab-gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/portfolio/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update portfolio image to sha-${{ steps.vars.outputs.IMAGE_TAG }}"
          git push
          # No imperative `argocd app sync` here: the portfolio Application has
          # automated sync (prune + selfHeal), so ArgoCD reconciles this commit
          # on its own. CI's job ends at pushing the GitOps change.

  deploy-dev:
    name: Deploy Dev Preview
    needs: build-and-push
    # DEV-ONLY: only push to development updates the preview's GitOps manifest.
    # Mirrors update-gitops but targets apps/portfolio-dev; ArgoCD auto-syncs
    # the portfolio-dev app (reachable on the LAN at
    # portfolio-dev.192.168.0.240.nip.io).
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    runs-on: [self-hosted, homelab]
    timeout-minutes: 15
    steps:
      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Checkout homelab-gitops
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: homelab-gitops

      - name: Update image tag in dev deployment
        run: |
          cd homelab-gitops
          # Dev preview pulls from portfolio/development. Match any current repo
          # under portfolio/ so this is robust across edits.
          sed -i -E "s|image: harbor.192.168.0.240.nip.io/portfolio/[^:[:space:]]+:.*|image: harbor.192.168.0.240.nip.io/portfolio/development:${{ steps.vars.outputs.IMAGE_TAG }}|" \
            apps/portfolio-dev/deployment.yaml
          echo "Updated to: ${{ steps.vars.outputs.IMAGE_TAG }}"
          grep "image:" apps/portfolio-dev/deployment.yaml

      - name: Commit and push to homelab-gitops
        run: |
          cd homelab-gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/portfolio-dev/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update portfolio-dev image to ${{ steps.vars.outputs.IMAGE_TAG }}"
          git push
          # No imperative `argocd app sync` here: the portfolio-dev Application
          # has automated sync (prune + selfHeal), so ArgoCD reconciles this
          # commit on its own. CI's job ends at pushing the GitOps change.
