name: Build and Deploy

# Branch model:
#   main     → production. Builds, pushes :latest + :sha-<sha>, updates GitOps,
#              triggers ArgoCD sync, smoke-tests miguelabf-devops.com.
#   develop  → integration. Builds and pushes :dev-<sha> only — no GitOps
#              update, no ArgoCD sync.
#   PRs      → build-only smoke test (no push).
# No paths filter — intentional. Asset-only changes (CV PDF, profile photo)
# must also trigger a rebuild so the new files are baked into the image.
#
# Build cache: every build (PRs included) reads/writes a registry-backed
# BuildKit cache (<registry>/portfolio/site:buildcache). A PR build warms the
# cache, so the follow-up build on merge replays the npm ci / npm run build
# layers for both arches instead of rebuilding from scratch.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancel superseded runs to avoid wasting the runner on stale commits.
# main is exempt — never cancel a production build/deploy mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  HARBOR_REGISTRY: harbor.192.168.0.240.nip.io
  HARBOR_PROJECT: portfolio
  IMAGE_NAME: site
  GITOPS_REPO: MiguelABFlores/homelab-gitops

jobs:
  build-and-push:
    name: Build & Push to Harbor
    runs-on: [self-hosted, homelab]
    timeout-minutes: 30
    steps:
      - name: Checkout portfolio source
        uses: actions/checkout@v4

      - name: Compute build params
        id: vars
        shell: bash
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          REG="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR build — local only, no push
            PUSH=false
            IMAGE_TAG="pr-${{ github.event.pull_request.number }}"
            TAGS="local/portfolio:${IMAGE_TAG}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            # Production build — push :sha-<sha> + :latest
            PUSH=true
            IMAGE_TAG="sha-${SHORT_SHA}"
            TAGS="${REG}:sha-${SHORT_SHA}
          ${REG}:latest"
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            # Dev build — push :dev-<sha> only
            PUSH=true
            IMAGE_TAG="dev-${SHORT_SHA}"
            TAGS="${REG}:dev-${SHORT_SHA}"
          else
            # workflow_dispatch on a non-default branch — build only
            PUSH=false
            IMAGE_TAG="branch-${SHORT_SHA}"
            TAGS="local/portfolio:${IMAGE_TAG}"
          fi

          echo "PUSH=${PUSH}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          {
            echo 'TAGS<<EOF'
            echo "${TAGS}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "Build params: ref=${{ github.ref }} event=${{ github.event_name }} push=${PUSH} tag=${IMAGE_TAG}"

      # Always log in: even PR builds (push=false) write the BuildKit layer
      # cache to Harbor so the later main/develop build replays it instead of
      # rebuilding from scratch. Pushing the final image is still gated by PUSH.
      - name: Login to Harbor
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | \
          docker login ${{ env.HARBOR_REGISTRY }} \
            --username ${{ secrets.HARBOR_USERNAME }} \
            --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:latest
          buildkitd-config-inline: |
            [registry."harbor.192.168.0.240.nip.io"]
              ca=["/etc/ssl/homelab/homelab-ca.crt"]

      - name: Build (and conditionally push) image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.vars.outputs.PUSH }}
          tags: ${{ steps.vars.outputs.TAGS }}
          # Registry-backed layer cache (covers both arches, mode=max caches
          # intermediate stages too). PR builds populate it; the merge build
          # reads it back — npm ci / npm run build become cache replays.
          cache-from: type=registry,ref=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          # Skip SBOM/provenance attestations: faster, and keeps :latest a clean
          # multi-arch manifest list instead of an attestation-wrapped index.
          provenance: false

      - name: Output image tag
        run: |
          echo "Built ${{ steps.vars.outputs.IMAGE_TAG }} (push=${{ steps.vars.outputs.PUSH }})"

  update-gitops:
    name: Update GitOps Repo
    needs: build-and-push
    # PROD-ONLY: only push to main triggers GitOps update + ArgoCD sync.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, homelab]
    timeout-minutes: 15
    steps:
      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Checkout homelab-gitops
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: homelab-gitops

      - name: Update image tag in deployment
        run: |
          cd homelab-gitops
          sed -i "s|image: harbor.192.168.0.240.nip.io/portfolio/site:.*|image: harbor.192.168.0.240.nip.io/portfolio/site:${{ steps.vars.outputs.IMAGE_TAG }}|" \
            apps/portfolio/deployment.yaml
          echo "Updated to: ${{ steps.vars.outputs.IMAGE_TAG }}"
          grep "image:" apps/portfolio/deployment.yaml

      - name: Commit and push to homelab-gitops
        run: |
          cd homelab-gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/portfolio/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update portfolio image to sha-${{ steps.vars.outputs.IMAGE_TAG }}"
          git push

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /tmp/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 /tmp/argocd /usr/local/bin/argocd
          argocd version --client

      - name: Trigger ArgoCD sync and wait for healthy
        run: |
          argocd login argocd.192.168.0.240.nip.io \
            --insecure \
            --grpc-web \
            --username admin \
            --password "${{ secrets.ARGOCD_PASSWORD }}"

          echo "Triggering sync..."
          argocd app sync portfolio --grpc-web

          echo "Waiting for deployment to be healthy..."
          argocd app wait portfolio \
            --health \
            --grpc-web \
            --timeout 120

          echo "Deployment complete!"
          argocd app get portfolio --grpc-web

      - name: Verify site is responding
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://miguelabf-devops.com)
          echo "Site returned HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: Site returned $STATUS instead of 200"
            exit 1
          fi
          echo "Site is live and healthy!"
