services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    image: miguelabf/portfolio:latest
    container_name: miguelabf-portfolio
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--tries=1", "--timeout=2", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
